<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0F4F8"/>
      <stop offset="100%" style="stop-color:#D9E2EC"/>
    </linearGradient>
    <linearGradient id="blue3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <linearGradient id="orange3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="40%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#EF4444"/>
    </linearGradient>
    <linearGradient id="ring3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1E3A5F" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Light background -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg3)"/>

  <!-- Outer circle badge -->
  <circle cx="256" cy="225" r="130" fill="#FFFFFF" filter="url(#shadow3)"/>
  <circle cx="256" cy="225" r="125" fill="#FFFFFF" stroke="url(#ring3)" stroke-width="3"/>

  <!-- Gear shape behind thermometer -->
  <g transform="translate(256,225)">
    <!-- Gear outer ring -->
    <circle cx="0" cy="0" r="95" fill="none" stroke="#E2E8F0" stroke-width="8"/>
    
    <!-- Gear teeth -->
    <g fill="#2563EB" opacity="0.15">
      <rect x="-10" y="-106" width="20" height="24" rx="4" transform="rotate(0)"/>
      <rect x="-10" y="-106" width="20" height="24" rx="4" transform="rotate(30)"/>
      <rect x="-10" y="-106" width="20" height="24" rx="4" transform="rotate(60)"/>
      <rect x="-10" y="-106" width="20" height="24" rx="4" transform="rotate(90)"/>
      <rect x="-10" y="-106" width="20" height="24" rx="4" transform="rotate(120)"/>
      <rect x="-10" y="-106" width="20" height="24" rx="4" transform="rotate(150)"/>
      <rect x="-10" y="-106" width="20" height="24" rx="4" transform="rotate(180)"/>
      <rect x="-10" y="-106" width="20" height="24" rx="4" transform="rotate(210)"/>
      <rect x="-10" y="-106" width="20" height="24" rx="4" transform="rotate(240)"/>
      <rect x="-10" y="-106" width="20" height="24" rx="4" transform="rotate(270)"/>
      <rect x="-10" y="-106" width="20" height="24" rx="4" transform="rotate(300)"/>
      <rect x="-10" y="-106" width="20" height="24" rx="4" transform="rotate(330)"/>
    </g>
    
    <!-- Inner gear ring -->
    <circle cx="0" cy="0" r="72" fill="none" stroke="#E2E8F0" stroke-width="2"/>
  </g>

  <!-- Thermometer icon - clean flat style -->
  <g transform="translate(256,215)">
    <!-- Thermo body -->
    <rect x="-14" y="-65" width="28" height="95" rx="14" fill="url(#blue3)"/>
    
    <!-- Thermo bulb -->
    <circle cx="0" cy="42" r="28" fill="url(#blue3)"/>
    
    <!-- Inner white track -->
    <rect x="-6" y="-52" width="12" height="80" rx="6" fill="#FFFFFF" opacity="0.3"/>
    
    <!-- Temperature fill -->
    <rect x="-6" y="-10" width="12" height="46" rx="6" fill="url(#orange3)"/>
    <circle cx="0" cy="42" r="18" fill="#EF4444" opacity="0.9"/>
    
    <!-- Tick marks -->
    <line x1="16" y1="-45" x2="24" y2="-45" stroke="#2563EB" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="16" y1="-28" x2="24" y2="-28" stroke="#2563EB" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="16" y1="-11" x2="24" y2="-11" stroke="#2563EB" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="16" y1="6" x2="20" y2="6" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- Shield checkmark badge (bottom right of circle) -->
  <g transform="translate(340,310)">
    <circle cx="0" cy="0" r="22" fill="#10B981" filter="url(#shadow3)"/>
    <!-- Checkmark -->
    <path d="M-8,1 L-3,7 L9,-5" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- App name -->
  <text x="256" y="390" text-anchor="middle" fill="#1E293B" 
        font-family="'Helvetica Neue', 'Segoe UI', sans-serif" font-size="32" font-weight="800" letter-spacing="2">TempGuard</text>
  <text x="256" y="415" text-anchor="middle" fill="#64748B" 
        font-family="'Helvetica Neue', 'Segoe UI', sans-serif" font-size="12" font-weight="500" letter-spacing="4">SMART FACTORY AI</text>
</svg>
